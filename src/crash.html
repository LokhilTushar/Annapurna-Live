const { Engine, Runner, Bodies, Composite, Events, Body, Vector } = Matter;
const engine = Engine.create();
engine.gravity.y = 0;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const width = window.innerWidth;
const height = window.innerHeight;
canvas.width = width;
canvas.height = height;

Runner.run(Runner.create(), engine);

Composite.add(engine.world, [
    Bodies.rectangle(width/2, 0, width, 40, { isStatic: true, label: 'wall' }),
    Bodies.rectangle(width/2, height, width, 40, { isStatic: true, label: 'wall' }),
    Bodies.rectangle(0, height/2, 40, height, { isStatic: true, label: 'wall' }),
    Bodies.rectangle(width, height/2, 40, height, { isStatic: true, label: 'wall' })
]);

let bubbles = [];
const BASE_SPEED = 5;
let rotationOffset = 0;

async function startGame() {
    document.getElementById('loading-screen').style.display = 'none';
    for (const data of followersData) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = "https://images.weserv.nl/?url=" + encodeURIComponent(data.avatarUrl);
        await new Promise((r) => { img.onload = () => r(); img.onerror = () => r(); });
        createBubble(data, img);
    }
    requestAnimationFrame(draw);
}

function createBubble(data, imgElement) {
    // Start with a small radius for high-density simulation
    const initialRadius = 10; 
    const bubble = Bodies.circle(Math.random()*width, Math.random()*height, initialRadius, {
        restitution: 1, frictionAir: 0, friction: 0, label: 'follower'
    });
    bubble.gameData = { ...data, currentRadius: initialRadius, img: imgElement, lives: 10 };
    const angle = Math.random() * Math.PI * 2;
    Body.setVelocity(bubble, { x: Math.cos(angle) * BASE_SPEED, y: Math.sin(angle) * BASE_SPEED });
    bubbles.push(bubble);
    Composite.add(engine.world, bubble);
}

Events.on(engine, 'collisionStart', (event) => {
    event.pairs.forEach(pair => {
        const { bodyA, bodyB } = pair;
        if (bodyA.label === 'follower' && bodyB.label === 'follower') {
            [bodyA, bodyB].forEach(body => {
                body.gameData.lives -= 1;
                if (body.gameData.lives <= 0) {
                    Composite.remove(engine.world, body);
                    bubbles = bubbles.filter(b => b.id !== body.id);
                }
            });
        }
    });
});

function draw() {
    ctx.clearRect(0, 0, width, height);
    const activeCount = bubbles.length;
    document.getElementById('count').innerText = activeCount;
    
    rotationOffset += 0.05;

    // --- ADJUSTED DYNAMIC SCALING ---
    // Multiplier of 600-800 is better for 1000+ followers
    const multiplier = 750; 
    const minRadius = 10;  // Don't let them get too tiny to see
    const maxRadius = 130; // Don't let them grow larger than the screen
    
    const targetRadius = Math.min(maxRadius, Math.max(minRadius, (multiplier / Math.sqrt(activeCount + 1))));

    bubbles.forEach(bubble => {
        const { x, y } = bubble.position;
        const data = bubble.gameData;
        
        // Apply Scaling to Physics Body
        const scaleFactor = targetRadius / data.currentRadius;
        Body.scale(bubble, scaleFactor, scaleFactor);
        data.currentRadius = targetRadius;

        // Draw Saw Blade
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotationOffset);
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#00d2d3";
        ctx.strokeStyle = "#00d2d3";
        ctx.lineWidth = 3;
        ctx.beginPath();
        const teeth = 12;
        for (let i = 0; i < teeth; i++) {
            const angle = (i / teeth) * Math.PI * 2;
            // Teeth only show if they still have lives for that "slot"
            const r = (i < data.lives) ? targetRadius * 1.3 : targetRadius;
            ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
            const nextAngle = ((i + 0.5) / teeth) * Math.PI * 2;
            ctx.lineTo(Math.cos(nextAngle) * targetRadius, Math.sin(nextAngle) * targetRadius);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.restore();

        // Draw Profile Picture
        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, targetRadius * 0.7, 0, Math.PI * 2);
        ctx.clip();
        if (data.img && data.img.complete) {
            ctx.drawImage(data.img, x - targetRadius * 0.7, y - targetRadius * 0.7, targetRadius * 1.4, targetRadius * 1.4);
        }
        ctx.restore();
    });

    if (activeCount > 0) requestAnimationFrame(draw);
}
